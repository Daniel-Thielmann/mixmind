repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff
        entry: ruff check --fix
        language: system
        types: [python]
        files: ^backend/.*\.py$

      - id: black
        name: Black
        entry: black
        language: system
        types: [python]
        files: ^backend/.*\.py$
