services:
  backend:

    container_name: mixmind-backend

    build:
      context: ./backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/processed:/app/processed
      - ./backend/temp:/app/temp

    restart: unless-stopped

  frontend:
    container_name: mixmind-frontend

    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production

    ports:
      - "3000:3000"

    depends_on:
      - backend

    restart: unless-stopped
