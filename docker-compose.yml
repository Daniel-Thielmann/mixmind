# ============================================================
# MixMind AI - Docker Compose
# ============================================================

networks:
  mixmind-network:
    driver: bridge

volumes:
  uploads-data:
  processed-data:
  temp-data:
  postgres-data:

services:
  backend:
    container_name: mixmind-backend
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - uploads-data:/app/uploads
      - processed-data:/app/processed
      - temp-data:/app/temp
    depends_on:
      postgres:
        condition: service_started
    networks:
      - mixmind-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    container_name: mixmind-frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mixmind-network
    restart: unless-stopped

  postgres:
    image: postgres:17

    container_name: mixmind-postgres

    environment:
      POSTGRES_DB: mixmind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - mixmind-network

    restart: unless-stopped
